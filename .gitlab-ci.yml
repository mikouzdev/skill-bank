default:
  image: node

cache:
  paths:
    - node_modules/

stages:
  - install
  - lint
  - build
  - deploy

install:
  stage: install
  script:
    - npm install -g pnpm
    - cd backend
    - pnpm install
    - cd ..
    - cd frontend
    - pnpm install
  #- pnpm run db:migrate (database has to be running)
    #- pnpm run db:seed

lint_backend:
  stage: lint
  script:
    - cd backend
    - npm install -g pnpm
    - pnpm install
    - npm run lint

lint_frontend:
  stage: lint
    - cd backend
    - npm install -g pnpm
    - pnpm install
    - pnpm run generate:apitypes
    - cd ..
    - cd frontend
    - pnpm install
    - npm run lint

