trigger:
  branches:
    include:
    - main
    exclude:
    - feature_branches

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Lint
    displayName: Format and lint code
    jobs:
      - job: Linting
        steps:
        - script: |
		cd frontend
		npm install -g pnpm
		pnpm install
		npm run lint
          displayName: "Install dependencies"  