stages:
  - lint
  - test
  - build_deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}-cypress
  paths:
    - node_modules/
    - .npm/
    - cache/Cypress/ # Cypress binary cache

variables:
  CYPRESS_BASE_URL: http://localhost:5173

e2e-tests:
  stage: test
  image: cypress/browsers:node-22.19.0-chrome-139.0.7258.154-1-ff-142.0.1-edge-139.0.3405.125-1
  services:
    - name: postgres:16 # or postgres:15, etc.
      alias: spankki
  variables:
    POSTGRES_DB: spankki
    POSTGRES_USER: pguser
    POSTGRES_PASSWORD: pgpass
  before_script:
    - npm install -g pnpm@latest
    - apt-get update -qq && apt-get install -y postgresql-client
    - cd frontend && pnpm install
    - cd ../backend && pnpm install
    - until pg_isready -h spankki -U ${POSTGRES_USER} -d ${POSTGRES_DB}; do sleep 1; done || true
    - pnpm run db:migrate
    - pnpm run db:generate
    - pnpm run db:seed
  script:
    - pnpm run dev &
    - npx wait-on tcp:localhost:3000 --timeout 90000 --interval 1000
    - cd ../frontend
    - pnpm run dev &
    - npx wait-on http://localhost:5173 --timeout 60000 --interval 1000
    - cd ..
    - pnpm add -D cypress@15.10.0
    - npx cypress install
    - npx cypress run --browser chrome --config baseUrl=http://localhost:5173
  artifacts:
    when: always
    paths:
      - cypress/screenshots/
      - cypress/videos/
      - cypress/reports/
    expire_in: 1 week

lint_backend:
  image: node:24
  stage: lint
  script:
    - cd backend
    - npm install -g pnpm
    - pnpm install
    - pnpm run db:generate
    - npm run lint

lint_frontend:
  image: node:24
  stage: lint
  script:
    - cd frontend
    - npm install -g pnpm
    - pnpm install
    - npm run lint

build_deploy_front:
  stage: build_deploy
  image: docker
  services:
    - docker:dind
  script:
    - docker build -f frontend/Dockerfile -t "${ACR_REPOSITORY}/spankki-frontend:latest" .
    - docker login "$ACR_REPOSITORY" -u "$ACR_USERNAME" -p "$ACR_PASSWORD"
    - docker push "${ACR_REPOSITORY}/spankki-frontend:latest"

build_deploy_back:
  stage: build_deploy
  image: docker
  services:
    - docker:dind
  script:
    - docker build -f backend/Dockerfile -t "$ACR_REPOSITORY/spankki-backend:latest" .
    - docker login "$ACR_REPOSITORY" -u "$ACR_USERNAME" -p "$ACR_PASSWORD"
    - docker push "$ACR_REPOSITORY/spankki-backend:latest"
