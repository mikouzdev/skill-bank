default:
  image: node

cache:
  paths:
    - node_modules/

stages:
  - install
  - lint
  - build
  - deploy

install:
  stage: install
  script:
    - npm install -g pnpm
    #- docker compose up -d
    - cd backend
    - pnpm install
    #- pnpm run db:migrate
    #- pnpm run db:seed
    - cd ..
    - cd frontend
    - pnpm install


lint_backend:
  stage: lint
  script:
    - cd backend
    - npm install -g pnpm
    - pnpm install
    #- npm run dev
    #- npm run generate:api-types
    - npm run lint

lint_frontend:
  stage: lint
  script:
    - cd backend
    - npm install -g pnpm
    - pnpm install
    #- npm run dev
    #- npm run generate:api-types
    - cd ..
    - cd frontend
    - pnpm install
    - npm run lint

build:
  stage: build
  script:
    - cd backend
    - npm run build

