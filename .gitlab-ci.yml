image: docker
services:
  - docker:dind

cache:
  paths:
    - node_modules/

stages:
  - build_deploy
  - install
  - deploy
  - lint

install:
  stage: install
  script:
    - npm install -g pnpm
    #- docker compose up -d
    - cd backend
    - pnpm install
    #- pnpm run db:migrate
    #- pnpm run db:seed
    - cd ..
    - cd frontend
    - pnpm install

lint_backend:
  stage: lint
  script:
    - cd backend
    - npm install -g pnpm
    - pnpm install
    - npm run lint

lint_frontend:
  stage: lint
  script:
    - cd frontend
    - npm install -g pnpm
    - pnpm install
    - npm run lint


build:
  stage: build_deploy
  script:
    - docker build -t "$ACR_REPOSITORY"/azure-pipeline-app:latest .
    - docker login "$ACR_REPOSITORY" -u "$ACR_USERNAME" -p "$ACR_PASSWORD"
    - docker push "$ACR_REPOSITORY"/azure-pipeline-app:latest

deploy:
  stage: deploy
  script:
    - cd backend
    - node ./dist/index.js
