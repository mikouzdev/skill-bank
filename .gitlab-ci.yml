default:
  image: node

cache:
  paths:
    - node_modules/

stages:
  - install
  - lint
  - build
  - deploy

install:
  stage: install
  script:
    - npm install pnpm
    - cd backend
    - pnpm install
    - pnpm run db:migrate (database has to be running)
    - pnpm run db:seed

lint:
  stage: lint
  script:
    - npm run lint

