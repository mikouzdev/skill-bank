name: spankki

services:
  db:
    image: postgres:18
    container_name: spankki-db
    restart: always
    env_file:
      - .env.example
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4
    container_name: spankki-pgadmin
    restart: always
    env_file:
      - .env.example
      - .env
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  db-data:
  pgadmin-data:
